<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>8th Wall Pysanka Magic</title>
    
    <!-- Бібліотеки -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <!-- Ваші бінарники 8th Wall -->
    <script src="xr-engine/xr.js"></script>
    <script type="module" src="xr-engine/xr-slam.js"></script>

    <script>
        // 1. КОМПОНЕНТ "ПРОЄКЦІЯ РОЗМАЛЬОВКИ"
        AFRAME.registerComponent('pysanka-projector', {
            init: function () {
                const scene = this.el.sceneEl
                this.pysanka = this.el.getObject3D('mesh')
                
                // Створюємо матеріал, який "вбирає" колір з камери
                this.material = new THREE.MeshBasicMaterial({
                    map: null, // Сюди ми покладемо потік камери
                })

                // Чекаємо, поки 8th Wall дасть нам доступ до текстури камери
                scene.addEventListener('realityready', () => {
                    // Отримуємо текстуру камери безпосередньо від 8th Wall
                    const cameraTexture = window.XR8.Threejs.cameraTexture()
                    this.material.map = cameraTexture
                })
            },
            tick: function () {
                // Кожен кадр ми оновлюємо проекцію текстури камери на яйце
                if (this.material.map) {
                    this.material.map.needsUpdate = true
                }
            }
        })

        // 2. ЗАПУСК 8TH WALL
        const startAR = () => {
            window.XR8.addCameraPipelineModules([
                window.XR8.GlTextureRenderer.pipelineModule(),
                window.XR8.Threejs.pipelineModule(),
                window.XR8.XrController.pipelineModule(),
            ])

            window.XR8.run({
                canvas: document.querySelector('a-scene').canvas,
                allowedDevices: 'any'
            })
        }

        window.addEventListener('load', startAR)
    </script>
</head>

<body>
    <!-- Сцена A-Frame -->
    <a-scene embedded xr-mode-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="eggModel" src="assets/pysanka.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 1.6 0"></a-camera>

        <!-- 
           Коли 8th Wall знаходить ваш Image Target (названий "pysanka_target"),
           він прив'язує до нього яйце.
        -->
        <a-entity 
            xrextras-named-target="name: pysanka_target"
            xrextras-resource-target
            gltf-model="#eggModel"
            pysanka-projector 
            scale="0.5 0.5 0.5"
            rotation="0 0 0">
        </a-entity>

    </a-scene>
</body>
</html>
